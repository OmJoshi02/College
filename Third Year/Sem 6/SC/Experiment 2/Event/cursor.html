<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text"
    placeholder="Enter name"
    onmouseenter="showMsg()"
    onmouseleave="hideMsg()"
    >

    <p id="msg"></p>

    <script>
        function showMsg(){
            document.getElementById("msg").innerText = "Cursor entered in input field"
        }

        function hideMsg(){
            document.getElementById("msg").innerText = "Cursor left input field"
        }
    </script>
</body>
</html>
